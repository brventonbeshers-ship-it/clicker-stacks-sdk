name: Test Pipeline

on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  test-and-validate:
    name: Test & Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install deps
        run: npm install

      - name: Install clicker-stacks-sdk from npm
        run: npm install clicker-stacks-sdk --no-save

      - name: Run typecheck
        continue-on-error: true
        run: npm run typecheck --if-present

      - name: Run linter
        continue-on-error: true
        run: npm run lint --if-present

      - name: Run tests
        continue-on-error: true
        run: npm test --if-present

      - name: Run build
        continue-on-error: true
        run: npm run build --if-present

      - name: Confirm SDK importable
        continue-on-error: true
        run: node -e "require('clicker-stacks-sdk'); console.log('clicker-stacks-sdk OK on', process.version);"
