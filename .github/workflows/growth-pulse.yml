name: Scheduled SDK Health Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: scheduled-clicker-stacks-sdk-health-check
  cancel-in-progress: true

jobs:
  scheduled-verify:
    name: Verify clicker-stacks-sdk from npm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare clean environment
        run: mkdir -p /tmp/clicker-stacks-sdk-check

      - name: Initialize project
        working-directory: /tmp/clicker-stacks-sdk-check
        run: npm init -y

      - name: Fetch clicker-stacks-sdk from registry
        working-directory: /tmp/clicker-stacks-sdk-check
        run: npm install clicker-stacks-sdk

      - name: Confirm SDK require succeeds
        working-directory: /tmp/clicker-stacks-sdk-check
        run: node -e "const sdk = require('clicker-stacks-sdk'); console.log('Scheduled health check: clicker-stacks-sdk OK');"

      - name: Show dependency tree
        working-directory: /tmp/clicker-stacks-sdk-check
        run: npm ls --all
